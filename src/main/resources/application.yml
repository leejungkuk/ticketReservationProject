spring:
  application:
    name: ticketReservationProject

  config:
    import:
      - classpath:account_info.yml

  # DB
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/trDB?characterEncoding=UTF-8&serverTimezone=Asia/Seoul&useSSL=false&allowPublicKeyRetrieval=true
    username: ${db.username}
    password: ${db.password}
  # JPA
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true

  # Redis
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:${redis.port}}
      password: ${REDIS_PASSWORD:${redis.password}}

  jwt:
    secretKey: ${jwt.secretKey}
    access-token-expiration: 3600000  # 1시간 (밀리초)
    refresh-token-expiration: 604800000  # 7일 (밀리초)

# log
logging:
  level:
    org.hibernate.SQL: debug
    org.hibernate.type.descriptor.sql.BasicBinder: trace

